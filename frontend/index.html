<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOBU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="imgs/favicon.png">
    <script type="module" src="index.js"></script>
</head>
<body>

    <div class="header">
        <img class="setting-icon-img" src="imgs/setting-icon.png" alt="setting icon">
    </div>

    <div class="center-content">
    <div class="logo">
        <img class="logo-img" src="imgs/logo.png" alt="red panda logo">
        <div class="logo-name rainbow-effect">TOBU</div>
    </div>

    <div class="search-line">
    <form id="search-form" name="search-box" autocomplete="off">
        <input class="search-box-input" name="query" type="text">
        <input class="search-box-input" type="submit" hidden />
    </form>
    </div>
    </div>

    <footer>
        <div class="credit-text">A <strong><div class="red-highlight">Red</div> Panda</strong> Software</div>
    </footer>
</body>
</html>
