<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOBU - History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="imgs/favicon.png">
    <script type="module" src="history.js" defer></script>
</head>
<body>

    <div class="top-content-search">
        <a href="index.html">
            <div class="logo">
                <img class="logo-img" src="imgs/logo.png" alt="red panda logo">
                <div class="logo-name rainbow-effect">TOBU</div>
            </div>
        </a>
    </div>

    <div class="center-master-div">
        <div class="left-div"></div>
        <div id="center-div-id" class="center-div">
    
            <div class="result-box"> 
                <div class="file-name">Python</div> 
                <div class="timestamp"> 
                    <div class="start time-dec">2026-03-09</div> 
                    <div class="end time-dec">09:30 AM</div> 
                </div> 
            </div>
        
            <div class="result-box"> 
                <div class="file-name">Legion</div> 
                <div class="timestamp"> 
                    <div class="start time-dec">2026-03-08</div> 
                    <div class="end time-dec">02:15 PM</div> 
                </div> 
            </div>
        
        </div>
        <div class="right-div"></div>
    </div>

    <footer>
        <div class="credit-text credit-text-search">A <strong><div class="red-highlight">Red</div> Panda</strong> Software</div>
    </footer>
</body>
</html>
